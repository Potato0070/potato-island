name: 🚀 土豆岛自动化部署 (Tencent Cloud)

on:
  push:
    branches:
      - main  # 只有推送到 main 分支时才触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 拉取最新代码
        uses: actions/checkout@v3

      - name: 🛠️ 安装环境并炼制 (Build)
        run: |
          npm install
          npx expo export

      - name: 🚁 空投代码到腾讯云
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist/*"
          target: "/var/www/html" # 确保这是你 Nginx 指向的目录
          strip_components: 1